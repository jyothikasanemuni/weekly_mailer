services:
  - type: web
    name: fm-mailer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: FM_MAPPINGS
        value: "{}"          # Replace this with your full fm_mappings.json content
      - key: PYTHON_VERSION
        value: "3.11.0"
